version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - gofumpt
    - misspell
    - stylecheck
    - gosec
    - nilerr
    - unparam
    - exportloopref
    - prealloc
    - dupl
    - gocyclo
    - nakedret
  disable:
    - deadcode
    - exhaustivestruct
    - ifshort
    - interfacer
    - maligned
    - golint
  settings:
    gocyclo:
        min-complexity: 15
    revive:
        severity: warning
    misspell:
        locale: US

